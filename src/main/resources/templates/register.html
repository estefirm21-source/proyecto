<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - GreenCert</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --primary: #4ade80;
            --text: #f8fafc;
            --text-dim: #94a3b8;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(to right, #ffffff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 2rem;
        }
        h2 { margin-bottom: 0.5rem; }
        p { color: var(--text-dim); margin-bottom: 2rem; font-size: 0.9rem; }
        .error { color: #f87171; margin-bottom: 1rem; font-size: 0.85rem; }
        form { display: flex; flex-direction: column; gap: 1.2rem; }
        input {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem 1rem;
            border-radius: 12px;
            color: white;
            font-family: inherit;
        }
        button {
            background: var(--primary);
            color: #064e3b;
            border: none;
            padding: 0.8rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        .footer { margin-top: 2rem; font-size: 0.85rem; color: var(--text-dim); }
        .footer a { color: var(--primary); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">GreenCert</div>
        <h2>Join GreenCert</h2>
        <p>Start tracking your environmental footprint</p>
        
        <div th:if="${error}" class="error" th:text="${error}"></div>
        
        <form th:action="@{/register}" method="post">
            <input type="text" name="companyName" placeholder="Company Name" required>
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Create Account</button>
        </form>
        
        <div class="footer">
            Already have an account? <a th:href="@{/login}">Sign in</a>
        </div>
    </div>
</body>
</html>
